version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-role-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./services:/app/services
      - ./controllers:/app/controllers
      - ./routes:/app/routes
      - ./config:/app/config
    restart: unless-stopped
    networks:
      - user-role-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  user-role-network:
    driver: bridge
